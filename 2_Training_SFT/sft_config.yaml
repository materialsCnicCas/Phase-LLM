### model
model_name_or_path: /home/yuanyang/liangsihan/Phase-LLM-Open-Source/2_Training_SFT/saves/phase-llm-qwen3-8b-sft-merged
adapter_name_or_path: /home/yuanyang/liangsihan/Phase-LLM-Open-Source/2_Training_SFT/saves/phase-llm-qwen3-8b-lora-sft/checkpoint-112
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all
lora_dropout: 0.05
default_system: "You are a senior metallurgist specializing in phase prediction for complex alloys. First reason step by step inside <think>...</think>. Then provide exactly one final label on a new line, choosing only one of: Only FCC and L12 phases form; Other phases form in addition to FCC and L12; L12 phase does not form. Do not invent new labels or paraphrase the final label."

### dataset
# IMPORTANT:
# 1) Copy this repo's 2_Training_SFT/dataset_info.json into LLaMA-Factory/data/dataset_info.json,
#    or merge the two JSON objects.
# 2) Place train_sft.jsonl into LLaMA-Factory/data/.
dataset: materials_phase_cot_sft
template: qwen3
cutoff_len: 4096
packing: false
val_size: 0.05
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: /home/yuanyang/liangsihan/Phase-LLM-Open-Source/2_Training_SFT/saves/phase-llm-qwen3-8b-lora-sft
logging_steps: 1
logging_first_step: true
save_strategy: epoch
save_total_limit: 5
plot_loss: true
overwrite_output_dir: false

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 2.0e-5
num_train_epochs: 16.0
resume_from_checkpoint: /home/yuanyang/liangsihan/Phase-LLM-Open-Source/2_Training_SFT/saves/phase-llm-qwen3-8b-lora-sft/checkpoint-112
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
seed: 42

### eval
eval_strategy: epoch

### logging
report_to: none
